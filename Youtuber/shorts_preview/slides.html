<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>M&A Hunter Story</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0d0d0d;
  font-family: -apple-system, 'PingFang TC', 'Helvetica Neue', sans-serif;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; gap: 0; padding: 20px 0;
}

/* ── 純內容區 405×720（9:16）── */
#slide {
  width: 405px; height: 720px;
  position: relative; overflow: hidden;
  border-radius: 4px;
}

/* ───── 背景系統 ───── */
.bg-hook   { background: radial-gradient(ellipse at 50% 35%, #0d1535 0%, #020408 100%); }
.bg-table  { background: radial-gradient(ellipse at 50% 30%, #0a1020 0%, #010306 100%); }
.bg-intl1  { background: radial-gradient(ellipse at 40% 30%, #1a0e2e 0%, #060008 100%); }
.bg-intl2  { background: radial-gradient(ellipse at 50% 35%, #0e1a1a 0%, #020c10 100%); }
.bg-intl3  { background: radial-gradient(ellipse at 50% 40%, #1a1200 0%, #080600 100%); }
.bg-tw1    { background: radial-gradient(ellipse at 50% 35%, #001a08 0%, #000802 100%); }
.bg-tw2    { background: radial-gradient(ellipse at 50% 30%, #001510 0%, #000605 100%); }
.bg-tw3    { background: radial-gradient(ellipse at 50% 35%, #001a12 0%, #000a06 100%); }
.bg-cta    { background: radial-gradient(ellipse at 50% 50%, #0f0f0f 0%, #000000 100%); }

/* ───── 공통 컨테이너 ───── */
.cnt {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 44px 30px; z-index: 5;
}
.cnt-top {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: flex-start;
  padding: 40px 28px; z-index: 5;
}

/* ───── 通用文字元件 ───── */
.week-tag {
  font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
  color: #C9A84C; margin-bottom: 8px; text-align: center;
  text-transform: uppercase;
}
.section-tag {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  color: rgba(201,168,76,.7); margin-bottom: 14px;
  text-align: left;
}
.divider { width: 36px; height: 2px; background: #C9A84C; border-radius: 2px; margin: 14px 0; }
.g  { color: #C9A84C; font-weight: 800; }
.tw { color: #69DB7C; font-weight: 800; }
.r  { color: #FF6B6B; font-weight: 700; }

/* 浮水印 */
.wm {
  position: absolute; bottom: 16px; right: 18px;
  font-size: 9px; font-weight: 700; color: rgba(201,168,76,.4);
  letter-spacing: 1.5px; z-index: 10;
}
/* 頁碼 */
.pg {
  position: absolute; bottom: 16px; left: 18px;
  font-size: 9px; font-weight: 600; color: rgba(255,255,255,.2);
  letter-spacing: 1px; z-index: 10;
}

/* ───── P1 Hook ───── */
.brand-logo {
  font-size: 42px; font-weight: 900; color: #fff;
  text-align: center; letter-spacing: -1px;
  line-height: 1.05;
}

.brand-sub {
  font-size: 11px; font-weight: 700; letter-spacing: 4px;
  color: rgba(255,255,255,.4); text-align: center; margin-top: 6px;
}
.stat-row {
  display: flex; gap: 12px; margin-top: 24px;
}
.stat-chip {
  background: rgba(201,168,76,.12);
  border: 1px solid rgba(201,168,76,.25);
  border-radius: 20px; padding: 9px 14px;
  text-align: center; flex: 1;
}
.stat-num { font-size: 22px; font-weight: 900; color: #C9A84C; line-height: 1; }
.stat-lbl { font-size: 9px; color: rgba(255,255,255,.45); margin-top: 3px; letter-spacing: .5px; }
.tagline {
  font-size: 14px; color: rgba(255,255,255,.55);
  text-align: center; margin-top: 22px; line-height: 1.75;
}
.pulse-ring {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(201,168,76,.08);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}

/* ───── P2 Table ───── */
.tbl-title {

}
.tbl-section {

}
.tbl-section.tw-sec { color: rgba(105,219,124,.6); }
.tbl-row {

.tbl-icon { font-size: 13px; flex-shrink: 0; width: 22px; }

.tbl-name { font-size: 11.5px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tbl-type { font-size: 9.5px; color: rgba(255,255,255,.4); margin-top: 1px; }
.tbl-amt  { font-size: 11px; font-weight: 800; color: #C9A84C; flex-shrink: 0; margin-left: 8px; }
.tbl-row.tw-row .tbl-amt { color: #69DB7C; }

/* ───── P2 Clean Table ───── */
.ct-header { font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 2px; }
.ct-sub    { font-size: 9px; color: rgba(255,255,255,.28); letter-spacing: 1px; margin-bottom: 10px; }
.ct-rule   { width: 100%; height: 1px; background: rgba(255,255,255,.12); margin: 6px 0; }
.ct-col    { display: flex; align-items: center; padding: 0 0 5px 24px; font-size: 8px; font-weight: 700; letter-spacing: 1.2px; color: rgba(255,255,255,.22); text-transform: uppercase; }

.ct-col-a  { width: 70px; text-align: right; }

.ct-n      { flex: 1; padding: 0 5px; min-width: 0; }
.ct-nm     { font-size: 11.5px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ct-tp     { font-size: 9px; color: rgba(255,255,255,.3); margin-top: 1px; }

.ct-s      { font-size: 8px; color: rgba(255,255,255,.25); width: 36px; flex-shrink: 0; text-align: right; white-space: nowrap; }
.ct-col-a  { width: 74px; text-align: right; flex-shrink: 0; }
.ct-col-s  { width: 36px; text-align: right; flex-shrink: 0; }

.sum-desc  { font-size: 10.5px; color: rgba(255,255,255,.45); line-height: 1.45; }

.p1-brand   { font-size: 44px; font-weight: 900; color: #fff; text-align: center; letter-spacing: -1px; line-height: 1.05; }
.p1-brand .amp { color: #C9A84C; }

.p1-stat    { font-size: 13.5px; color: rgba(255,255,255,.55); text-align: center; line-height: 2.1; }
.p1-stat .hl { color: #C9A84C; font-weight: 800; }
.p1-tag     { font-size: 12.5px; color: rgba(255,255,255,.38); text-align: center; line-height: 1.9; }

/* ───── P2 HTML Table ───── */
.cnt-tbl    { position: absolute; inset: 0; display: flex; flex-direction: column; padding: 36px 26px; z-index: 5; }
.deal-tbl   { width: 100%; border-collapse: collapse; margin-top: 10px; }
.deal-tbl thead th { font-size: 8.5px; font-weight: 700; letter-spacing: 1.2px; color: rgba(255,255,255,.22); text-transform: uppercase; padding: 5px 8px 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,.15); }
.deal-tbl thead th.r { text-align: right; }
.deal-tbl tbody td { padding: 9px 8px; border-bottom: 1px solid rgba(255,255,255,.07); vertical-align: middle; }
.td-ico  { width: 22px; font-size: 12px; padding-left: 2px !important; }
.td-nm   { font-size: 12px; font-weight: 700; color: #fff; }
.td-tp   { font-size: 9px; color: rgba(255,255,255,.32); margin-top: 2px; }
.td-amt  { width: 82px; text-align: right; font-size: 10px; font-weight: 800; color: #C9A84C; white-space: nowrap; }
.td-sts  { width: 36px; text-align: right; font-size: 8.5px; color: rgba(255,255,255,.28); white-space: nowrap; }
.sec-hd td { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; padding: 11px 8px 3px !important; border-bottom: none !important; }
.intl-hd td { color: rgba(201,168,76,.65); }
.tw-hd   td { color: rgba(105,219,124,.65); }
.tw-row  .td-amt { color: #69DB7C; }

/* ───── Story Page (P3-P8) ───── */
.story-cat {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;

.story-target {
  font-size: 26px; font-weight: 900; color: #fff;
  line-height: 1.15; margin-bottom: 6px;
}
.story-amt {
  font-size: 38px; font-weight: 900; color: #C9A84C;
  line-height: 1; margin-bottom: 4px;
}
.story-amt.tw-amt { color: #69DB7C; }
.story-amt-sub {
  font-size: 12px; color: rgba(255,255,255,.45);
  margin-bottom: 16px;

.story-pts { width: 100%; }
.story-pt {
  display: flex; align-items: flex-start; gap: 10px;
  background: rgba(255,255,255,.06);
  border-radius: 10px; padding: 10px 12px;
  margin-bottom: 8px;

.story-pt-ico { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.story-pt-txt { font-size: 11.5px; color: rgba(255,255,255,.82); line-height: 1.5; }
.story-insight {
  margin-top: 14px;
  font-size: 14px; font-weight: 700; color: #fff;
  text-align: center; line-height: 1.7;
  padding: 12px 16px;
  background: rgba(201,168,76,.1);
  border-radius: 10px;
  border: 1px solid rgba(201,168,76,.2);
  width: 100%;
}
.story-insight.tw-insight {
  background: rgba(105,219,124,.08);
  border-color: rgba(105,219,124,.2);
}

/* multi-story (P5 生技雙彈) */
.dual-card {
  width: 100%;
  background: rgba(255,255,255,.06);
  border-radius: 12px; padding: 14px 16px;
  margin-bottom: 10px;
}
.dual-tag { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; color: #C9A84C; margin-bottom: 5px; }
.dual-title { font-size: 15px; font-weight: 800; color: #fff; }
.dual-amt { font-size: 20px; font-weight: 900; color: #C9A84C; margin: 2px 0 5px 0; }
.dual-desc { font-size: 11px; color: rgba(255,255,255,.5); line-height: 1.5; }

/* ───── P9 CTA ───── */
.cta-logo { font-size: 50px; font-weight: 900; color: #fff; text-align: center; line-height: 1.05; }
.cta-logo .amp { color: #C9A84C; }
.cta-desc { font-size: 13px; color: rgba(255,255,255,.5); text-align: center; margin-top: 12px; line-height: 1.8; }
.cta-btn {
  margin-top: 28px;
  background: #C9A84C; color: #000;
  border-radius: 30px; padding: 14px 40px;
  font-size: 15px; font-weight: 900; letter-spacing: .5px;
  display: inline-block; text-align: center;
}
.cta-handles {
  margin-top: 18px; display: flex; gap: 16px;
}
.cta-h {
  font-size: 11px; color: rgba(255,255,255,.3);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 16px; padding: 6px 14px;
}
.cta-insight {
  margin-top: 20px;
  font-size: 13px; color: rgba(255,255,255,.6);
  text-align: center; line-height: 1.8;
  font-style: italic;
}

/* ───── 導航（不進截圖）───── */
.nav { display: flex; align-items: center; gap: 14px; margin-top: 18px; }
.nb {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
  color: #fff; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;

.nb:disabled { opacity: .3; cursor: default; }
.nlbl { font-size: 12px; color: rgba(255,255,255,.4); min-width: 60px; text-align: center; }
.hint { margin-top: 6px; font-size: 10px; color: rgba(255,255,255,.2); text-align: center; }

.export-bar { display: flex; gap: 10px; margin-top: 12px; }
.eb {
  padding: 10px 22px; border-radius: 22px;
  font-size: 13px; font-weight: 700; cursor: pointer; border: none;

.eb-one { background: rgba(255,255,255,.1); color: #fff; border: 1px solid rgba(255,255,255,.2); }
.eb-all { background: #C9A84C; color: #000; }

.pmsg { margin-top: 6px; font-size: 11px; color: #C9A84C; text-align: center; min-height: 16px; }
</style>
</head>

function render() {
  const s = SCENES[cur];
  const el = document.getElementById('slide');
  el.className = s.bg;
  el.innerHTML = s.content;
  document.getElementById('lbl').textContent = `${cur + 1} / ${N}`;
  document.getElementById('prev').disabled = cur === 0;
  document.getElementById('next').disabled = cur === N - 1;
}

function go(d) {
  cur = Math.max(0, Math.min(N - 1, cur + d));
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft')  go(-1);
});

// ── Export ──
const SCALE = 1080 / 405;

async function captureSlide(i) {
  cur = i; render();
  await new Promise(r => setTimeout(r, 220));
  return html2canvas(document.getElementById('slide'), {
    scale: SCALE,
    useCORS: true,
    allowTaint: true,
    backgroundColor: null,
    logging: false,
    width: 405,
    height: 720
  });
}

async function exportOne() {
  const c = await captureSlide(cur);
  dl(c, `MA_Hunter_S${String(cur+1).padStart(2,'0')}.png`);
}

async function exportAll() {
  const btn = document.getElementById('btn-all');
  const msg = document.getElementById('pmsg');
  btn.disabled = true;
  const orig = cur;
  for (let i = 0; i < N; i++) {
    msg.textContent = `產生中 ${i+1} / ${N}…`;
    const c = await captureSlide(i);
    dl(c, `${String(i+1).padStart(2,'0')}_MA_Hunter_Story.png`);
    await new Promise(r => setTimeout(r, 350));
  }
  cur = orig; render();
  msg.textContent = `✅ 全部 ${N} 張完成`;
  btn.disabled = false;
  setTimeout(() => msg.textContent = '', 5000);
}

function dl(canvas, name) {
  const a = document.createElement('a');
  a.download = name;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

render();
</script>
